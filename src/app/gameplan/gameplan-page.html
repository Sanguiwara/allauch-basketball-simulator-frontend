<div class="page">
  <section class="panel">
    <div class="panel__header">
      <div class="panel__header-left">
        <h2 class="panel__title">GamePlan</h2>
        <span class="pill">Strategy</span>
      </div>
    </div>

    @if (gamePlan; as gp) {
      <mat-tab-group class="tabs">
        <mat-tab label="Selection">
          <div class="tab-body">
            <app-player-selection-tab [gamePlan]="gp"></app-player-selection-tab>
          </div>
        </mat-tab>

        <mat-tab label="Defensive Matchups">
          <div class="tab-body">
            <gameplan-matchup-component [gamePlan]="gp"></gameplan-matchup-component>
          </div>
        </mat-tab>

        <mat-tab label="Offense & Usage">
          <div class="tab-body">
            <app-gameplan-offense [gamePlan]="gp" ></app-gameplan-offense>
          </div>
        </mat-tab>
      </mat-tab-group>
    } @else {
      <div class="state">Chargement…</div>
    }
  </section>
</div>
