<div class="page">
  <div class="board">

    <section class="panel">
      <div class="panel__header">
        <div class="panel__header-left">
          <h2 class="panel__title">Player Selection</h2>
          <span class="pill">{{ homePlayers.length }}</span>
        </div>

        <button mat-raised-button class="save-btn" (click)="saveActivePlayers()">
          Sauvegarder
        </button>
      </div>

      <div class="list">
        @for (p of homePlayers; track p.id) {
          <mat-card class="card">
            <mat-card-content class="card__body">
              <div class="row">
                <div class="left">
                  <div class="name">{{ p.name }}</div>

                  <div class="stats">
                    <div class="stat"><div class="label">DEF EXT</div><div class="value">{{ p.defExterieur }}</div></div>
                    <div class="stat"><div class="label">POSTE</div><div class="value">{{ p.defPoste }}</div></div>
                    <div class="stat"><div class="label">RIM</div><div class="value">{{ p.protectionCercle }}</div></div>
                  </div>
                </div>

                <div class="right">
                  <!-- Colonne 1 : Play / Don't play -->
                  <mat-radio-group
                    class="radios"
                    [value]="getChoice(p.id)"
                    (change)="setChoice(p.id, $event.value)"
                  >
                    <mat-radio-button class="radio" value="play">Play</mat-radio-button>
                    <mat-radio-button class="radio" value="noPlay">Don't play</mat-radio-button>
                  </mat-radio-group>

                  <!-- Colonne 2 : Starter / Bench -->
                  <div class="starter-col">
                    <mat-radio-group
                      class="radios"
                      [disabled]="getChoice(p.id) !== 'play'"
                      [value]="getStarterChoice(p.id)"
                      (change)="setStarterChoice(p.id, $event.value)"
                    >
                      <mat-radio-button
                        class="radio"
                        value="starter"
                        [disabled]="!canSelectStarter(p.id)"
                      >
                        Starter
                      </mat-radio-button>

                      <mat-radio-button class="radio" value="bench">Bench</mat-radio-button>
                    </mat-radio-group>


                  </div>
                </div>


              </div>
            </mat-card-content>
          </mat-card>
        }
      </div>
    </section>

  </div>
</div>
